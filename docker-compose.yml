services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  ehrbase:
    image: ehrbase/ehrbase:latest
    depends_on:
      - postgres
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SECURITY_AUTHTYPE: ${SECURITY_AUTHTYPE}
      SECURITY_AUTHUSER: ${SECURITY_AUTHUSER}
      SECURITY_AUTHPASSWORD: ${SECURITY_AUTHPASSWORD}
    ports:
      - "8080:8080"
